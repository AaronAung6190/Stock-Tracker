const FINNHUB_KEY = "YOUR_KEY_HERE";

function useLivePrices() {
  const [audUsd, setAudUsd] = useState(0.637);
  const mkBase = (base) => {
    const mk=(len,amp)=>Array.from({length:len},(_,i)=>+(base*(1+(Math.sin(i/8)+Math.random()-0.5)*amp)).toFixed(3));
    return {current:base,prev:base,open:base,high:+(base*1.012).toFixed(3),low:+(base*0.988).toFixed(3),
      volume:Math.floor(Math.random()*800000+200000),change:0,changePct:0,isLive:false,
      history:mk(60,.015),history5d:mk(40,.018),history1m:mk(30,.025),history6m:mk(26,.04),history1y:mk(52,.06)};
  };
  const [prices, setPrices] = useState(()=>Object.fromEntries(TICKERS.map(t=>[t.id,mkBase(t.basePrice)])));

  useEffect(()=>{
    const go=()=>fetch("https://api.frankfurter.app/latest?from=USD&to=AUD")
      .then(r=>r.json()).then(d=>{if(d.rates?.AUD)setAudUsd(1/d.rates.AUD);}).catch(()=>{});
    go(); const id=setInterval(go,300000); return()=>clearInterval(id);
  },[]);

  const fetchNVDA=useCallback(async()=>{
    if(!FINNHUB_KEY||FINNHUB_KEY==="YOUR_KEY_HERE")return;
    try{
      const res=await fetch(`https://finnhub.io/api/v1/quote?symbol=NVDA&token=${FINNHUB_KEY}`);
      const d=await res.json();
      if(d&&d.c>0){
        const aud=+(d.c/audUsd).toFixed(3),openAud=+(d.o/audUsd).toFixed(3);
        const ch=+(aud-openAud).toFixed(3),chPct=openAud>0?+((ch/openAud)*100).toFixed(2):0;
        setPrices(prev=>({...prev,NVDA:{...prev.NVDA,current:aud,prev:prev.NVDA.current,
          open:openAud,high:+(d.h/audUsd).toFixed(3),low:+(d.l/audUsd).toFixed(3),
          change:ch,changePct:chPct,audUsd,isLive:true,
          history:[...prev.NVDA.history.slice(1),aud],history5d:[...prev.NVDA.history5d.slice(1),aud]}}));
      }
    }catch(e){}
  },[audUsd]);

  useEffect(()=>{fetchNVDA();const id=setInterval(fetchNVDA,30000);return()=>clearInterval(id);},[fetchNVDA]);

  useEffect(()=>{
    const id=setInterval(()=>{
      setPrices(prev=>{
        const next={...prev};
        TICKERS.forEach(t=>{
          const old=prev[t.id]; if(!old)return;
          const drift=t.id==="NVDA"?0.002:0.004;
          const np=+(old.current*(1+(Math.random()-0.497)*drift)).toFixed(3);
          const ch=+(np-old.open).toFixed(3);
          next[t.id]={...old,prev:old.current,current:np,
            high:Math.max(old.high,np),low:Math.min(old.low,np),
            change:ch,changePct:+((ch/old.open)*100).toFixed(2),
            history:[...old.history.slice(1),np],history5d:[...old.history5d.slice(1),np]};
        });
        return next;
      });
    },2000);
    return()=>clearInterval(id);
  },[]);
  return prices;
}

function generateAnalysis(t,p){
  const avg10=p.history.slice(-10).reduce((a,b)=>a+b,0)/10;
  const avg30=p.history.reduce((a,b)=>a+b,0)/p.history.length;
  const momentum=p.current>avg10&&avg10>avg30?"bullish":p.current<avg10&&avg10<avg30?"bearish":"neutral";
  const recent=p.history.slice(-20),mean=recent.reduce((a,b)=>a+b,0)/recent.length;
  const std=Math.sqrt(recent.map(v=>(v-mean)**2).reduce((a,b)=>a+b,0)/recent.length);
  const vol=(std/mean)*100,dayPos=p.high-p.low>0?(p.current-p.low)/(p.high-p.low):0.5;
  let signal,conf;
  if(momentum==="bullish"&&dayPos>0.5){signal="BUY";conf=vol<1.5?"High":"Medium";}
  else if(momentum==="bearish"&&dayPos<0.4){signal="SELL";conf="Medium";}
  else{signal="HOLD";conf="Medium";}
  const isTech=["NVDA","FANG"].includes(t.id),bm=isTech?1.18:t.id==="PMGOLD"?1.10:1.12,dm=isTech?0.82:t.id==="PMGOLD"?0.91:0.88;
  return{signal,conf,bull:+(p.current*bm).toFixed(2),base:+(p.current*((bm+dm)/2)).toFixed(2),bear:+(p.current*dm).toFixed(2),
    momentum,vol:vol.toFixed(2),rsi:Math.round(40+Math.random()*30),
    macd:momentum==="bullish"?"Bullish crossover":momentum==="bearish"?"Bearish crossover":"Neutral",
    support:+(p.low*0.98).toFixed(2),resistance:+(p.high*1.02).toFixed(2)};
}

function LineChart({data,color,height=140}){
  const W=340,H=height,min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*W},${H-4-((v-min)/range)*(H-8)}`).join(" ");
  const gid="g"+color.replace("#","");
  return(<svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{display:"block"}}>
    <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor={color} stopOpacity="0.18"/><stop offset="100%" stopColor={color} stopOpacity="0"/>
    </linearGradient></defs>
    <polygon points={`0,${H-4-((data[0]-min)/range)*(H-8)} ${pts} ${W},${H} 0,${H}`} fill={`url(#${gid})`}/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
  </svg>);
}

}

      <span style={{fontWeight:600,fontSize:15,color:C.dark}}>{editId?"Edit":"Add Holding"}</span>
      <button onClick={submit} style={{background:"transparent",border:"none",color:C.accent,fontSize:15,fontWeight:700}}>Save</button>
    </div>
    <div style={{padding:"20px 16px",display:"flex",flexDirection:"column",gap:14}}>
      {[{label:"Ticker Code",key:"ticker",placeholder:"e.g. DHHF",type:"text"},
        {label:"Units",key:"units",placeholder:"e.g. 100",type:"number"},
        {label:"Avg Cost (A$)",key:"avgCost",placeholder:"e.g. 38.50",type:"number"}].map(({label,key,placeholder,type})=>(
        <div key={key} style={{background:C.panel,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
          <input type={type} value={form[key]} onChange={e=>setForm(p=>({...p,[key]:type==="text"?e.target.value.toUpperCase():e.target.value}))} placeholder={placeholder}
            style={{width:"100%",border:"none",outline:"none",fontSize:17,color:C.dark,fontWeight:600,background:"transparent",fontFamily:"monospace"}}/>
        </div>
      ))}
      {err&&<div style={{color:C.red,fontSize:13,textAlign:"center"}}>{err}</div>}
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {TICKERS.map(t=>(
          <button key={t.id} onClick={()=>setForm(p=>({...p,ticker:t.id}))}
            style={{background:form.ticker===t.id?C.accent:`${C.accent}10`,border:`1px solid ${form.ticker===t.id?C.accent:C.border}`,
              color:form.ticker===t.id?"#fff":C.accent,padding:"8px 14px",borderRadius:20,fontSize:13,fontWeight:600}}>{t.id}</button>
        ))}
      </div>
      <button onClick={submit} style={{background:C.accent,border:"none",color:"#fff",padding:"15px",borderRadius:12,fontSize:15,fontWeight:700}}>{editId?"Update":"Add to Portfolio"}</button>
    </div>
  </div>);

  return(<div style={{background:C.bg,minHeight:"100%",paddingBottom:20}}>
    <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"16px 20px 14px"}} className="safe-top">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:20,fontWeight:700,color:C.dark}}>Portfolio</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{rows.length} holdings</div></div>
        <button onClick={openAdd} style={{background:C.accent,border:"none",color:"#fff",width:36,height:36,borderRadius:18,fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      </div>
    </div>
    {rows.length===0?(<div style={{padding:"60px 24px",textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:16}}>📊</div>
      <div style={{fontSize:17,fontWeight:600,color:C.dark,marginBottom:8}}>No holdings yet</div>
      <button onClick={openAdd} style={{background:C.accent,border:"none",color:"#fff",padding:"14px 32px",borderRadius:24,fontSize:15,fontWeight:700}}>+ Add First Holding</button>
    </div>):(<div style={{padding:"16px"}}>
      <div style={{background:C.panel,borderRadius:14,padding:"18px",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
        <div style={{fontSize:12,color:C.muted,marginBottom:4}}>Total Portfolio Value</div>
        <div style={{fontSize:30,fontWeight:700,color:C.dark,fontFamily:"monospace"}}>A${totalVal.toFixed(2)}</div>
        <div style={{display:"flex",gap:20,marginTop:10}}>
          <div><div style={{fontSize:11,color:C.muted,marginBottom:2}}>Cost</div><div style={{fontSize:14,fontWeight:600,color:C.dark,fontFamily:"monospace"}}>A${totalCost.toFixed(2)}</div></div>
          <div><div style={{fontSize:11,color:C.muted,marginBottom:2}}>P&L</div><div style={{fontSize:14,fontWeight:700,color:totalPnL>=0?C.green:C.red,fontFamily:"monospace"}}>{totalPnL>=0?"+":""}A${totalPnL.toFixed(2)} ({totalPct>=0?"+":""}{ totalPct.toFixed(2)}%)</div></div>

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {rows.map(r=>(<div key={r.id} style={{background:C.panel,borderRadius:14,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div onClick={()=>onSelectTicker(r.ticker)} style={{cursor:"pointer"}}>

              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:40,height:40,borderRadius:20,background:`${C.accent}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{r.icon}</div>
                <div>
                  <div style={{fontWeight:700,fontSize:15,color:C.dark}}>{r.ticker} <span style={{fontSize:12}}>{r.flag}</span></div>
                  <div style={{fontSize:11,color:C.muted,marginTop:1,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</div>
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:14,fontWeight:700,color:C.dark,fontFamily:"monospace"}}>A${r.mktVal.toFixed(2)}</div>
                <div style={{fontSize:12,fontWeight:600,color:r.pnl>=0?C.green:C.red,marginTop:2}}>{r.pnl>=0?"+":""}A${r.pnl.toFixed(2)} ({r.pnlPct>=0?"+":""}{ r.pnlPct.toFixed(1)}%)</div>

            </div>

function SwanBullionScreen({sharedBarPrice,onPriceUpdate}){
  const [spotAUD,setSpotAUD]=useState(null);
  const [barPrice,setBarPrice]=useState(sharedBarPrice||null);
  const [loading,setLoading]=useState(false);
  const [lastFetched,setLastFetched]=useState(null);
  const [holdings,setHoldings]=useState(()=>{try{return JSON.parse(localStorage.getItem("swan_holdings")||"[]");}catch{return[];}});
  const [form,setForm]=useState({qty:"",paidPer:""});
  const [history,setHistory]=useState(sharedBarPrice?[sharedBarPrice]:[]);
  const TROY_OZ=5/31.1035,PREMIUM=1.04;
  useEffect(()=>{if(sharedBarPrice&&!barPrice)setBarPrice(sharedBarPrice);},[sharedBarPrice]);

  const fetchSpot=useCallback(async()=>{
    setLoading(true);
    try{
      let spot=null;
      // Method 1: open.er-api.com supports XAU natively, free no key needed
      try{
        const res=await fetch("https://open.er-api.com/v6/latest/XAU");
        const d=await res.json();
        if(d.result==="success"&&d.rates?.AUD&&d.rates.AUD>1000) spot=d.rates.AUD;
      }catch(e1){}
      // Method 2: Frankfurter USD/AUD + hardcoded USD gold spot fallback
      if(!spot){
        try{
          const fxRes=await fetch("https://api.frankfurter.app/latest?from=USD&to=AUD");
          const fx=await fxRes.json();
          if(fx.rates?.AUD){
            // USD gold price from exchangerate.host (free, supports metals)
            const goldRes=await fetch("https://api.exchangerate.host/latest?base=XAU&symbols=AUD&access_key=");
            const gd=await goldRes.json();
            if(gd.rates?.AUD&&gd.rates.AUD>1000) spot=gd.rates.AUD;
          }
        }catch(e2){}
      }
      // Method 3: use GOLD ETF as proxy (A$57 per unit x 100 = spot per oz approx)
      if(!spot||spot<1000){
        // Derive from shared price if available, otherwise use known fallback
        spot = sharedBarPrice ? (sharedBarPrice/(TROY_OZ*PREMIUM)) : 5700;
      }
      const price=spot*TROY_OZ*PREMIUM;
      setSpotAUD(spot);setBarPrice(price);setLastFetched(new Date());
      setHistory(h=>[...h.slice(-29),price]);if(onPriceUpdate)onPriceUpdate(price);
    }catch(e){
      const fallback=sharedBarPrice||(5700*TROY_OZ*PREMIUM);
      setBarPrice(fallback);setLastFetched(new Date());if(onPriceUpdate)onPriceUpdate(fallback);
    }
    setLoading(false);
  },[onPriceUpdate,sharedBarPrice]);

  useEffect(()=>{fetchSpot();const id=setInterval(fetchSpot,120000);return()=>clearInterval(id);},[fetchSpot]);

  // Simulated micro-movement between real fetches (±0.05% drift)
  useEffect(()=>{
    const id=setInterval(()=>{
      setBarPrice(prev=>{
        if(!prev)return prev;
        const drift=(Math.random()-0.497)*0.0005;
        const next=+(prev*(1+drift)).toFixed(2);
        setHistory(h=>[...h.slice(-29),next]);
        if(onPriceUpdate)onPriceUpdate(next);
        return next;
      });
    },3000);
    return()=>clearInterval(id);
  },[onPriceUpdate]);

  const saveH=h=>{setHoldings(h);try{localStorage.setItem("swan_holdings",JSON.stringify(h));}catch{}};
  const addHolding=()=>{const qty=parseInt(form.qty),paid=parseFloat(form.paidPer);if(!qty||qty<1||isNaN(paid)||paid<=0)return;saveH([...holdings,{id:Date.now(),qty,paidPer:paid}]);setForm({qty:"",paidPer:""});};
  const totalBars=holdings.reduce((s,h)=>s+h.qty,0),totalCost=holdings.reduce((s,h)=>s+h.qty*h.paidPer,0);
  const totalValue=barPrice?totalBars*barPrice:0,totalPnL=totalValue-totalCost,totalPct=totalCost>0?(totalPnL/totalCost)*100:0;
  const minH=history.length>1?Math.min(...history):0,maxH=history.length>1?Math.max(...history):1;

  return(<div style={{background:C.bg,minHeight:"100%",paddingBottom:20}}>
    <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"16px 20px 14px"}} className="safe-top">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:20,fontWeight:700,color:C.dark}}>🥇 Swan Bullion</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>Perth Mint 5g · Live AUD Spot</div></div>
        <button onClick={fetchSpot} disabled={loading} style={{background:`${C.accent}10`,border:`1px solid ${C.accent}30`,color:C.accent,padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:600}}>{loading?"…":"↻ Refresh"}</button>
      </div>
    </div>
    <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.panel,borderRadius:14,padding:"20px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
        <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Current Bar Price (Est.)</div>
        <div style={{fontSize:36,fontWeight:700,color:C.dark,fontFamily:"monospace"}}>{barPrice?`A$${barPrice.toFixed(2)}`:"Loading…"}</div>
        <div style={{fontSize:12,color:C.muted,marginTop:4}}>5g · 99.99% fine · Perth Mint · ~4% dealer premium</div>
        {history.length>2&&(<div style={{marginTop:14,height:50}}>
          <svg width="100%" viewBox="0 0 300 50" preserveAspectRatio="none" style={{display:"block"}}>
            <defs><linearGradient id="gg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.amber} stopOpacity="0.2"/><stop offset="100%" stopColor={C.amber} stopOpacity="0"/></linearGradient></defs>
            {(()=>{const pts=history.map((v,i)=>`${(i/(history.length-1))*300},${46-((v-minH)/(maxH-minH||1))*42}`).join(" ");return(<g><polygon points={`0,46 ${pts} 300,46`} fill="url(#gg)"/><polyline points={pts} fill="none" stroke={C.amber} strokeWidth="2" strokeLinejoin="round"/></g>);})()}
          </svg>
        </div>)}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
          {[["AUD Gold Spot",spotAUD?`A$${spotAUD.toFixed(2)}/oz`:"—"],["Per gram",spotAUD?`A$${(spotAUD/31.1035).toFixed(2)}/g`:"—"],
            ["Pure metal",spotAUD?`A$${(spotAUD*TROY_OZ).toFixed(2)}`:"—"],["Updated",lastFetched?lastFetched.toLocaleTimeString():"—"]].map(([l,v])=>(
            <div key={l}><div style={{fontSize:11,color:C.muted,marginBottom:3}}>{l}</div><div style={{fontSize:13,fontWeight:600,color:C.dark,fontFamily:"monospace"}}>{v}</div></div>
          ))}
        </div>
      </div>
      {totalBars>0&&(<div style={{background:C.panel,borderRadius:14,padding:"18px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
        <div style={{fontWeight:600,fontSize:13,color:C.dark,marginBottom:14}}>My Holdings</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          {[["Total Bars",`${totalBars}×5g`],["Weight",`${totalBars*5}g`],["Value",barPrice?`A$${totalValue.toFixed(2)}`:"—"],["Cost",`A$${totalCost.toFixed(2)}`]].map(([l,v])=>(
            <div key={l} style={{background:C.bg,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:10,color:C.muted,marginBottom:3,textTransform:"uppercase"}}>{l}</div><div style={{fontSize:13,fontWeight:600,color:C.dark,fontFamily:"monospace"}}>{v}</div></div>
          ))}
        </div>
        <div style={{background:totalPnL>=0?`${C.green}10`:`${C.red}10`,borderRadius:10,padding:"12px 14px",border:`1px solid ${totalPnL>=0?C.green:C.red}25`}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Total P&L</div>
          <div style={{fontSize:22,fontWeight:700,color:totalPnL>=0?C.green:C.red,fontFamily:"monospace"}}>{totalPnL>=0?"+":""}A${totalPnL.toFixed(2)}</div>
          <div style={{fontSize:12,color:totalPnL>=0?C.green:C.red,marginTop:2}}>{totalPct>=0?"+":""}{ totalPct.toFixed(2)}% return</div>
        </div>
        {holdings.map((h,i)=>(<div key={h.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
          <div><div style={{fontSize:13,color:C.dark,fontWeight:600}}>Lot {i+1}: {h.qty} bar{h.qty>1?"s":""}</div><div style={{fontSize:11,color:C.muted}}>Paid A${h.paidPer.toFixed(2)}/bar</div></div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:13,fontWeight:600,color:C.dark,fontFamily:"monospace"}}>{barPrice?`A$${(h.qty*barPrice).toFixed(2)}`:"—"}</div>
            {barPrice&&<div style={{fontSize:11,color:(barPrice-h.paidPer)>=0?C.green:C.red}}>{(barPrice-h.paidPer)>=0?"+":""}A${((barPrice-h.paidPer)*h.qty).toFixed(2)}</div>}
          </div>
          <button onClick={()=>saveH(holdings.filter(x=>x.id!==h.id))} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"4px 8px",borderRadius:6,fontSize:11,marginLeft:10}}>✕</button>
        </div>))}
      </div>)}
      <div style={{background:C.panel,borderRadius:14,padding:"18px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
        <div style={{fontWeight:600,fontSize:13,color:C.dark,marginBottom:14}}>{totalBars>0?"Add More Bars":"Add Your Bars"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {[{label:"Number of bars",key:"qty",placeholder:"e.g. 2",type:"number"},{label:"Price paid/bar (A$)",key:"paidPer",placeholder:barPrice?barPrice.toFixed(2):"1027.20",type:"number"}].map(({label,key,placeholder,type})=>(
            <div key={key} style={{background:C.bg,borderRadius:10,padding:"12px 14px"}}>
              <div style={{fontSize:11,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
              <input type={type} value={form[key]} onChange={e=>setForm(p=>({...p,[key]:e.target.value}))} placeholder={placeholder}
                style={{width:"100%",border:"none",outline:"none",fontSize:17,color:C.dark,fontWeight:600,background:"transparent",fontFamily:"monospace"}}/>
            </div>
          ))}
          <button onClick={addHolding} style={{background:C.amber,border:"none",color:"#fff",padding:"14px",borderRadius:12,fontSize:14,fontWeight:700}}>+ Add to Holdings</button>
        </div>
      </div>
    </div>
  </div>);
}

        </div>

const EXPENSE_CATEGORIES=[{id:"rent",label:"Rent/Mortgage",icon:"🏠",color:"#e8334a"},{id:"food",label:"Food & Groceries",icon:"🛒",color:"#f5a623"},{id:"transport",label:"Transport",icon:"🚗",color:"#1a56db"},{id:"utilities",label:"Utilities",icon:"⚡",color:"#7c3aed"},{id:"entertainment",label:"Entertainment",icon:"🎬",color:"#0891b2"},{id:"health",label:"Health",icon:"💊",color:"#00a86b"},{id:"shopping",label:"Shopping",icon:"🛍️",color:"#db2777"},{id:"other",label:"Other",icon:"📦",color:"#6b7280"}];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function FinanceScreen(){
  const now=new Date();
  const [selMonth,setSelMonth]=useState(now.getMonth());const [selYear,setSelYear]=useState(now.getFullYear());
  const [screen,setScreen]=useState("dash");
  const [txForm,setTxForm]=useState({desc:"",amount:"",type:"expense",cat:"food",date:new Date().toISOString().slice(0,10)});
  const [goalForm,setGoalForm]=useState({name:"",target:"",saved:""});const [editGoalId,setEditGoalId]=useState(null);
  const load=(key,def)=>{try{return JSON.parse(localStorage.getItem(key)||"null")||def;}catch{return def;}};
  const persist=(key,val)=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{}};
  const [transactions,setTransactions]=useState(()=>load("fin_transactions",[]));
  const [goals,setGoals]=useState(()=>load("fin_goals",[]));
  const [income,setIncome]=useState(()=>load("fin_income",{}));
  const saveTx=v=>{setTransactions(v);persist("fin_transactions",v);};
  const saveGoals=v=>{setGoals(v);persist("fin_goals",v);};
  const saveIncome=v=>{setIncome(v);persist("fin_income",v);};
  const monthKey=`${selYear}-${String(selMonth+1).padStart(2,"0")}`;
  const prevMonth=selMonth===0?11:selMonth-1,prevYear=selMonth===0?selYear-1:selYear;
  const prevKey=`${prevYear}-${String(prevMonth+1).padStart(2,"0")}`;
  const monthTx=transactions.filter(t=>t.date.startsWith(monthKey));
  const prevTx=transactions.filter(t=>t.date.startsWith(prevKey));
  const monthExpenses=monthTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const prevExpenses=prevTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const monthIncome=income[monthKey]||0,prevIncome=income[prevKey]||0;
  const saved=monthIncome-monthExpenses,savedPct=monthIncome>0?Math.round((saved/monthIncome)*100):0;
  const byCat=EXPENSE_CATEGORIES.map(cat=>({...cat,amount:monthTx.filter(t=>t.type==="expense"&&t.cat===cat.id).reduce((s,t)=>s+t.amount,0)})).filter(c=>c.amount>0).sort((a,b)=>b.amount-a.amount);

  const addTx=()=>{const amount=parseFloat(txForm.amount);if(!txForm.desc.trim()||isNaN(amount)||amount<=0)return;saveTx([{id:Date.now(),desc:txForm.desc.trim(),amount,type:txForm.type,cat:txForm.cat,date:txForm.date},...transactions]);setTxForm({desc:"",amount:"",type:"expense",cat:"food",date:new Date().toISOString().slice(0,10)});setScreen("dash");};
  const deleteTx=id=>saveTx(transactions.filter(t=>t.id!==id));
  const addGoal=()=>{const target=parseFloat(goalForm.target),sv=parseFloat(goalForm.saved)||0;if(!goalForm.name.trim()||isNaN(target)||target<=0)return;if(editGoalId){saveGoals(goals.map(g=>g.id===editGoalId?{...g,name:goalForm.name.trim(),target,saved:sv}:g));setEditGoalId(null);}else saveGoals([...goals,{id:Date.now(),name:goalForm.name.trim(),target,saved:sv}]);setGoalForm({name:"",target:"",saved:""});setScreen("dash");};
  const deleteGoal=id=>saveGoals(goals.filter(g=>g.id!==id));

  const RingChart=({pct,size=90,color,label,sublabel})=>{const r=32,cx=size/2,cy=size/2,circ=2*Math.PI*r,dash=Math.min(pct/100,1)*circ;return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}><circle cx={cx} cy={cy} r={r} fill="none" stroke={C.border} strokeWidth="7"/><circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="7" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" transform={`rotate(-90 ${cx} ${cy})`}/><text x={cx} y={cy-4} textAnchor="middle" fontSize="14" fontWeight="700" fill={C.dark}>{pct}%</text>{label&&<text x={cx} y={cy+10} textAnchor="middle" fontSize="8" fill={C.muted}>{label}</text>}{sublabel&&<text x={cx} y={cy+20} textAnchor="middle" fontSize="7" fill={C.muted}>{sublabel}</text>}</svg>);};

,0,0.06)"}}><div style={{fontSize:11,color:C.muted,marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>Category</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{EXPENSE_CATEGORIES.map(cat=>(<button key={cat.id} onClick={()=>setTxForm(p=>({...p,cat:cat.id}))} style={{background:txForm.cat===cat.id?cat.color:`${cat.color}15`,border:`1px solid ${txForm.cat===cat.id?cat.color:C.border}`,color:txForm.cat===cat.id?"#fff":C.dark,padding:"6px 12px",borderRadius:20,fontSize:12,fontWeight:600}}>{cat.icon} {cat.label.split(" ")[0]}</button>))}</div></div>)}<button onClick={addTx} style={{background:txForm.type==="expense"?C.red:C.green,border:"none",color:"#fff",padding:"15px",borderRadius:12,fontSize:15,fontWeight:700}}>Add {txForm.type==="expense"?"Expense":"Income"}</button></div></div>);

  if(screen==="addGoal")return(<div style={{background:C.bg,minHeight:"100%"}}><div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px"}} className="safe-top"><button onClick={()=>{setScreen("dash");setEditGoalId(null);setGoalForm({name:"",target:"",saved:""}); }} style={{background:"transparent",border:"none",color:C.accent,fontSize:15,fontWeight:600}}>Cancel</button><span style={{fontWeight:600,fontSize:15,color:C.dark}}>{editGoalId?"Edit Goal":"New Goal"}</span><button onClick={addGoal} style={{background:"transparent",border:"none",color:C.accent,fontSize:15,fontWeight:700}}>Save</button></div><div style={{padding:"20px 16px",display:"flex",flexDirection:"column",gap:12}}>{[{label:"Goal Name",key:"name",placeholder:"e.g. Emergency Fund",type:"text"},{label:"Target Amount (A$)",key:"target",placeholder:"e.g. 20000",type:"number"},{label:"Amount Saved (A$)",key:"saved",placeholder:"e.g. 5000",type:"number"}].map(({label,key,placeholder,type})=>(<div key={key} style={{background:C.panel,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}><div style={{fontSize:11,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div><input type={type} value={goalForm[key]} onChange={e=>setGoalForm(p=>({...p,[key]:e.target.value}))} placeholder={placeholder} style={{width:"100%",border:"none",outline:"none",fontSize:16,color:C.dark,fontWeight:600,background:"transparent",fontFamily:type==="number"?"monospace":"inherit"}}/></div>))}<button onClick={addGoal} style={{background:C.accent,border:"none",color:"#fff",padding:"15px",borderRadius:12,fontSize:15,fontWeight:700}}>{editGoalId?"Update Goal":"Create Goal"}</button></div></div>);

  return(<div style={{background:C.bg,minHeight:"100%",paddingBottom:20}}>
    <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"16px 20px 14px"}} className="safe-top">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:20,fontWeight:700,color:C.dark}}>💰 Finance</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{MONTHS[selMonth]} {selYear}</div></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>{if(selMonth===0){setSelMonth(11);setSelYear(y=>y-1);}else setSelMonth(m=>m-1);}} style={{background:C.bg,border:`1px solid ${C.border}`,color:C.dark,width:32,height:32,borderRadius:16,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <button onClick={()=>{if(selMonth===11){setSelMonth(0);setSelYear(y=>y+1);}else setSelMonth(m=>m+1);}} style={{background:C.bg,border:`1px solid ${C.border}`,color:C.dark,width:32,height:32,borderRadius:16,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          <button onClick={()=>setScreen("addTx")} style={{background:C.accent,border:"none",color:"#fff",width:36,height:36,borderRadius:18,fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
        </div>
      </div>
    </div>
    <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.panel,borderRadius:14,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}><div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Monthly Income (A$)</div><input type="number" value={monthIncome||""} onChange={e=>{const v=parseFloat(e.target.value)||0;saveIncome({...income,[monthKey]:v});}} placeholder="Enter your income for this month" style={{width:"100%",border:"none",outline:"none",fontSize:20,color:C.dark,fontWeight:700,background:"transparent",fontFamily:"monospace"}}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        {[{label:"INCOME",val:`A$${monthIncome.toLocaleString("en-AU",{minimumFractionDigits:0})}`,sub:prevIncome>0?`${monthIncome>=prevIncome?"↑":"↓"} vs ${MONTHS[prevMonth]}`:"",color:C.green},
          {label:"EXPENSES",val:`A$${Math.round(monthExpenses).toLocaleString("en-AU")}`,sub:prevExpenses>0?`${monthExpenses<=prevExpenses?"↓":"↑"} vs ${MONTHS[prevMonth]}`:"",color:C.red},
          {label:"SAVED",val:`A$${Math.max(0,Math.round(saved)).toLocaleString("en-AU")}`,sub:savedPct>0?`${savedPct}% of income`:"",color:saved>=0?C.accent:C.red}].map(({label,val,sub,color})=>(
          <div key={label} style={{background:C.panel,borderRadius:12,padding:"12px 10px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}><div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>{label}</div><div style={{fontSize:13,fontWeight:700,color:C.dark,fontFamily:"monospace",lineHeight:1.2}}>{val}</div>{sub&&<div style={{fontSize:9,color,marginTop:3,fontWeight:600}}>{sub}</div>}</div>
        ))}
      </div>
      {byCat.length>0&&(<div style={{background:C.panel,borderRadius:14,padding:"16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}><div style={{fontWeight:600,fontSize:13,color:C.dark,marginBottom:12}}>Expenses by Category</div>{byCat.map(cat=>{const pct=monthExpenses>0?Math.round((cat.amount/monthExpenses)*100):0;return(<div key={cat.id} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><span style={{fontSize:13,color:C.dark}}>{cat.icon} {cat.label}</span><span style={{fontSize:13,fontWeight:600,color:C.dark,fontFamily:"monospace"}}>A${cat.amount.toFixed(2)}</span></div><div style={{height:6,background:C.bg,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:cat.color,borderRadius:3}}/></div></div>);})}</div>)}
      <div style={{background:C.panel,borderRadius:14,padding:"16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{fontWeight:600,fontSize:13,color:C.dark}}>Savings Goals</div><button onClick={()=>setScreen("addGoal")} style={{background:`${C.accent}10`,border:`1px solid ${C.accent}30`,color:C.accent,padding:"5px 12px",borderRadius:16,fontSize:12,fontWeight:600}}>+ Goal</button></div>{goals.length===0?(<div style={{textAlign:"center",padding:"20px 0",color:C.muted,fontSize:13}}>No goals yet — tap + Goal to add one</div>):(<div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch"}}>{goals.map(g=>{const pct=g.target>0?Math.min(100,Math.round((g.saved/g.target)*100)):0;return(<div key={g.id} style={{background:C.bg,borderRadius:12,padding:"14px",minWidth:140,flexShrink:0,textAlign:"center"}}><RingChart pct={pct} color={pct>=100?C.green:C.accent} label={`A$${(g.saved/1000).toFixed(1)}k`} sublabel={`of A$${(g.target/1000).toFixed(0)}k`}/><div style={{fontSize:12,fontWeight:600,color:C.dark,marginTop:8,lineHeight:1.3}}>{g.name}</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>A${(g.target-g.saved).toFixed(0)} to go</div><div style={{display:"flex",gap:4,marginTop:8,justifyContent:"center"}}><button onClick={()=>{setGoalForm({name:g.name,target:String(g.target),saved:String(g.saved)});setEditGoalId(g.id);setScreen("addGoal");}} style={{background:`${C.accent}10`,border:"none",color:C.accent,padding:"4px 8px",borderRadius:8,fontSize:10,fontWeight:600}}>Edit</button><button onClick={()=>deleteGoal(g.id)} style={{background:`${C.red}10`,border:"none",color:C.red,padding:"4px 8px",borderRadius:8,fontSize:10,fontWeight:600}}>✕</button></div></div>);})}</div>)}</div>
      <div style={{background:C.panel,borderRadius:14,padding:"16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{fontWeight:600,fontSize:13,color:C.dark}}>Recent Transactions</div><button onClick={()=>setScreen("addTx")} style={{background:`${C.accent}10`,border:`1px solid ${C.accent}30`,color:C.accent,padding:"5px 12px",borderRadius:16,fontSize:12,fontWeight:600}}>+ Add</button></div>{monthTx.length===0?(<div style={{textAlign:"center",padding:"20px 0",color:C.muted,fontSize:13}}>No transactions for {MONTHS[selMonth]}. Tap + Add to log one.</div>):[...monthTx].slice(0,10).map(tx=>{const cat=EXPENSE_CATEGORIES.find(c=>c.id===tx.cat);return(<div key={tx.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}><div style={{width:36,height:36,borderRadius:18,background:tx.type==="income"?`${C.green}15`:`${cat?.color||C.muted}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{tx.type==="income"?"💰":cat?.icon||"📦"}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,color:C.dark,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tx.desc}</div><div style={{fontSize:11,color:C.muted,marginTop:1}}>{tx.date} · {tx.type==="income"?"Income":cat?.label||"Other"}</div></div><div style={{fontSize:14,fontWeight:700,color:tx.type==="income"?C.green:C.red,fontFamily:"monospace",flexShrink:0}}>{tx.type==="income"?"+":"-"}A${tx.amount.toFixed(2)}</div><button onClick={()=>deleteTx(tx.id)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,width:24,height:24,borderRadius:12,fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button></div>);})}</div>
    </div>
  </div>);
}


// ── DCA Calculator ────────────────────────────────────────────────
function DCAScreen({prices}){
  const [ticker,  setTicker]  = useState("DHHF");
  const [monthly, setMonthly] = useState("");
  const [years,   setYears]   = useState(7);
  const [growthRate, setGrowthRate] = useState(9);
  const [lumpSum, setLumpSum] = useState("");
  const [brokerage, setBrokerage] = useState(11);

  const t    = TICKERS.find(x => x.id===ticker);
  const p    = prices[ticker];
  const price= p?.current || t?.basePrice || 10;
  const sym  = "A$";

  const monthlyAmt  = parseFloat(monthly)  || 0;
  const lumpSumAmt  = parseFloat(lumpSum)  || 0;
  const brokerageAmt= parseFloat(brokerage)|| 0;
  const rate        = growthRate / 100;
  const months      = years * 12;

  // DCA projection: FV of monthly contributions + lump sum
  const monthlyRate = rate / 12;
  const dcaFV = monthlyAmt > 0 && monthlyRate > 0
    ? monthlyAmt * ((Math.pow(1+monthlyRate, months)-1) / monthlyRate)
    : monthlyAmt * months;
  const lumpFV    = lumpSumAmt * Math.pow(1+rate, years);
  const totalFV   = dcaFV + lumpFV;

  // Total invested (cost)
  const totalBrokerage = monthlyAmt > 0 ? months * brokerageAmt : 0;
  const totalInvested  = monthlyAmt * months + lumpSumAmt;
  const totalGain      = totalFV - totalInvested;
  const totalReturn    = totalInvested > 0 ? (totalGain/totalInvested)*100 : 0;

  // Units you'd get per month at current price
  const unitsPerMonth  = monthlyAmt > 0 ? Math.floor((monthlyAmt-brokerageAmt)/price) : 0;
  const costPerUnit    = price;

  // Year-by-year projection
  const projections = Array.from({length:years}, (_,i) => {
    const yr   = i+1;
    const m    = yr*12;
    const fvDCA= monthlyAmt > 0 && monthlyRate > 0
      ? monthlyAmt * ((Math.pow(1+monthlyRate,m)-1)/monthlyRate)
      : monthlyAmt*m;
    const fvLS = lumpSumAmt * Math.pow(1+rate, yr);
    return {yr, value:+(fvDCA+fvLS).toFixed(2), invested:+(monthlyAmt*m+lumpSumAmt).toFixed(2)};
  });

  const maxVal = projections.length > 0 ? Math.max(...projections.map(p=>p.value)) : 1;

  return(
    <div style={{background:C.bg,minHeight:"100%",paddingBottom:20}}>
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"16px 20px 14px"}} className="safe-top">
        <div style={{fontSize:20,fontWeight:700,color:C.dark}}>📐 DCA Calculator</div>
        <div style={{fontSize:12,color:C.muted,marginTop:2}}>Dollar-cost averaging projections</div>
      </div>

      <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>

        {/* Ticker selector */}
        <div style={{background:C.panel,borderRadius:14,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Select Ticker</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {TICKERS.map(t=>(
              <button key={t.id} onClick={()=>setTicker(t.id)}
                style={{background:ticker===t.id?C.accent:`${C.accent}10`,
                  border:`1px solid ${ticker===t.id?C.accent:C.border}`,
                  color:ticker===t.id?"#fff":C.accent,
                  padding:"7px 14px",borderRadius:20,fontSize:13,fontWeight:600}}>
                {t.icon} {t.id}
              </button>
            ))}
          </div>
          <div style={{marginTop:10,fontSize:12,color:C.muted}}>
            Current price: <strong style={{color:C.dark,fontFamily:"monospace"}}>{sym}{price.toFixed(3)}</strong>
          </div>
        </div>

        {/* Inputs */}
        <div style={{background:C.panel,borderRadius:14,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {[
              {label:"Monthly contribution (A$)",val:monthly,set:setMonthly,placeholder:"e.g. 500"},
              {label:"Lump sum today (A$)",val:lumpSum,set:setLumpSum,placeholder:"e.g. 2000 (optional)"},
              {label:"Brokerage per trade (A$)",val:brokerage,set:setBrokerage,placeholder:"11"},
            ].map(({label,val,set,placeholder})=>(
              <div key={label} style={{borderBottom:`1px solid ${C.border}`,paddingBottom:10}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
                <input type="number" value={val} onChange={e=>set(e.target.value)} placeholder={placeholder}
                  style={{width:"100%",border:"none",outline:"none",fontSize:17,color:C.dark,fontWeight:600,background:"transparent",fontFamily:"monospace"}}/>
              </div>
            ))}
            <div>
              <div style={{fontSize:11,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>
                Investment horizon: <strong style={{color:C.dark}}>{years} years</strong>
              </div>
              <input type="range" min="1" max="30" value={years} onChange={e=>setYears(Number(e.target.value))}
                style={{width:"100%",accentColor:C.accent}}/>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.muted,marginTop:4}}>
                <span>1yr</span><span>10yr</span><span>20yr</span><span>30yr</span>
              </div>
            </div>
            <div>
              <div style={{fontSize:11,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>
                Expected annual return: <strong style={{color:C.dark}}>{growthRate}%</strong>
              </div>
              <input type="range" min="3" max="20" value={growthRate} onChange={e=>setGrowthRate(Number(e.target.value))}
                style={{width:"100%",accentColor:C.accent}}/>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.muted,marginTop:4}}>
                <span>3% conservative</span><span>9% historical avg</span><span>20%</span>
              </div>
            </div>
          </div>
        </div>

        {monthlyAmt > 0 && (
          <>
            {/* Per-month summary */}
            <div style={{background:C.panel,borderRadius:14,padding:"16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
              <div style={{fontWeight:600,fontSize:13,color:C.dark,marginBottom:12}}>Per Month</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[
                  ["Units you'd buy", `${unitsPerMonth} units`],
                  ["Cost per unit",   `${sym}${costPerUnit.toFixed(2)}`],
                  ["After brokerage", `${sym}${(monthlyAmt-brokerageAmt).toFixed(2)}`],
                  ["Annual spend",    `${sym}${(monthlyAmt*12).toFixed(0)}`],
                ].map(([l,v])=>(
                  <div key={l} style={{background:C.bg,borderRadius:8,padding:"10px 12px"}}>
                    <div style={{fontSize:10,color:C.muted,marginBottom:3,textTransform:"uppercase"}}>{l}</div>
                    <div style={{fontSize:13,fontWeight:600,color:C.dark,fontFamily:"monospace"}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Final projection */}
            <div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}25`,borderRadius:14,padding:"18px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
              <div style={{fontWeight:600,fontSize:13,color:C.dark,marginBottom:14}}>
                After {years} years at {growthRate}% p.a.
              </div>
              <div style={{fontSize:32,fontWeight:800,color:C.accent,fontFamily:"monospace",marginBottom:8}}>
                {sym}{totalFV.toLocaleString("en-AU",{minimumFractionDigits:0,maximumFractionDigits:0})}
              </div>
              <div style={{display:"flex",gap:20}}>
                <div>
                  <div style={{fontSize:11,color:C.muted,marginBottom:2}}>Total invested</div>
                  <div style={{fontSize:14,fontWeight:600,color:C.dark,fontFamily:"monospace"}}>{sym}{totalInvested.toLocaleString("en-AU",{minimumFractionDigits:0})}</div>
                </div>
                <div>
                  <div style={{fontSize:11,color:C.muted,marginBottom:2}}>Total gain</div>
                  <div style={{fontSize:14,fontWeight:700,color:C.green,fontFamily:"monospace"}}>+{sym}{totalGain.toLocaleString("en-AU",{minimumFractionDigits:0})} ({totalReturn.toFixed(0)}%)</div>
                </div>
              </div>
              {totalBrokerage>0&&(
                <div style={{marginTop:8,fontSize:11,color:C.muted}}>
                  Brokerage cost over {years} years: {sym}{totalBrokerage.toFixed(0)} — consider Moomoo ($3/trade) to save {sym}{(months*(brokerageAmt-3)).toFixed(0)}
                </div>
              )}
            </div>

            {/* Year by year chart */}
            <div style={{background:C.panel,borderRadius:14,padding:"16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
              <div style={{fontWeight:600,fontSize:13,color:C.dark,marginBottom:14}}>Year-by-Year Projection</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {projections.filter((_,i)=> years<=10 ? true : i%2===0 || i===years-1).map(proj=>{
                  const valPct  = (proj.value/maxVal)*100;
                  const invPct  = (proj.invested/maxVal)*100;
                  const gain    = proj.value - proj.invested;
                  return(
                    <div key={proj.yr}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                        <span style={{fontSize:11,color:C.muted,width:36}}>Yr {proj.yr}</span>

// ── Price Alerts ──────────────────────────────────────────────────
function AlertsScreen({prices}){
  const [alerts,setAlerts]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("price_alerts")||"[]");}catch{return[];}
  });
  const [form,setForm]=useState({ticker:"DHHF",condition:"below",target:"",note:""});
  const [screen,setScreen]=useState("list");
  const [triggered,setTriggered]=useState([]);

  const save=a=>{setAlerts(a);try{localStorage.setItem("price_alerts",JSON.stringify(a));}catch{}};

  // Check alerts every time prices update
  useEffect(()=>{
    const fired=[];
    alerts.forEach(a=>{
      const curr=prices[a.ticker]?.current;
      if(!curr)return;
      const hit=(a.condition==="below"&&curr<=a.target)||(a.condition==="above"&&curr>=a.target);
      if(hit&&!a.triggered)fired.push(a.id);
    });
    if(fired.length>0){
      save(alerts.map(a=>fired.includes(a.id)?{...a,triggered:true,triggeredAt:new Date().toLocaleTimeString()}:a));
      setTriggered(prev=>[...new Set([...prev,...fired])]);
    }
  },[prices]);

  const addAlert=()=>{
    const target=parseFloat(form.target);
    if(isNaN(target)||target<=0)return;
    save([...alerts,{id:Date.now(),ticker:form.ticker,condition:form.condition,target,note:form.note.trim(),triggered:false,createdAt:new Date().toLocaleDateString()}]);
    setForm({ticker:"DHHF",condition:"below",target:"",note:""});
    setScreen("list");
  };
  const deleteAlert=id=>save(alerts.filter(a=>a.id!==id));
  const resetAlert=id=>save(alerts.map(a=>a.id===id?{...a,triggered:false,triggeredAt:null}:a));

  if(screen==="add")return(
    <div style={{background:C.bg,minHeight:"100%"}}>
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px"}} className="safe-top">
        <button onClick={()=>setScreen("list")} style={{background:"transparent",border:"none",color:C.accent,fontSize:15,fontWeight:600}}>Cancel</button>
        <span style={{fontWeight:600,fontSize:15,color:C.dark}}>New Alert</span>
        <button onClick={addAlert} style={{background:"transparent",border:"none",color:C.accent,fontSize:15,fontWeight:700}}>Save</button>
      </div>
      <div style={{padding:"20px 16px",display:"flex",flexDirection:"column",gap:12}}>
        <div style={{background:C.panel,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>Ticker</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {TICKERS.map(t=>(
              <button key={t.id} onClick={()=>setForm(p=>({...p,ticker:t.id}))}
                style={{background:form.ticker===t.id?C.accent:`${C.accent}10`,border:`1px solid ${form.ticker===t.id?C.accent:C.border}`,color:form.ticker===t.id?"#fff":C.accent,padding:"7px 14px",borderRadius:20,fontSize:13,fontWeight:600}}>
                {t.icon} {t.id}
              </button>
            ))}
          </div>
          {prices[form.ticker]&&<div style={{marginTop:10,fontSize:12,color:C.muted}}>Current: <strong style={{color:C.dark,fontFamily:"monospace"}}>A${prices[form.ticker].current.toFixed(3)}</strong></div>}
        </div>
        <div style={{background:C.panel,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>Condition</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[{v:"below",l:"📉 Drops below"},{v:"above",l:"📈 Rises above"}].map(({v,l})=>(
              <button key={v} onClick={()=>setForm(p=>({...p,condition:v}))}
                style={{background:form.condition===v?C.dark:`${C.accent}10`,border:"none",color:form.condition===v?"#fff":C.muted,padding:"12px",borderRadius:10,fontSize:13,fontWeight:600}}>
                {l}
              </button>
            ))}
          </div>
        </div>
        <div style={{background:C.panel,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Target Price (A$)</div>
          <input type="number" value={form.target} onChange={e=>setForm(p=>({...p,target:e.target.value}))} placeholder="e.g. 300.00"
            style={{width:"100%",border:"none",outline:"none",fontSize:17,color:C.dark,fontWeight:600,background:"transparent",fontFamily:"monospace"}}/>
        </div>
        <div style={{background:C.panel,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Note (optional)</div>
          <input value={form.note} onChange={e=>setForm(p=>({...p,note:e.target.value}))} placeholder="e.g. DCA entry point"
            style={{width:"100%",border:"none",outline:"none",fontSize:16,color:C.dark,fontWeight:600,background:"transparent"}}/>
        </div>
        <button onClick={addAlert} style={{background:C.accent,border:"none",color:"#fff",padding:"15px",borderRadius:12,fontSize:15,fontWeight:700}}>
          Create Alert
        </button>
      </div>
    </div>
  );

  const activeAlerts   = alerts.filter(a=>!a.triggered);
  const triggeredAlerts= alerts.filter(a=>a.triggered);

  return(
    <div style={{background:C.bg,minHeight:"100%",paddingBottom:20}}>
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"16px 20px 14px"}} className="safe-top">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:20,fontWeight:700,color:C.dark}}>🔔 Price Alerts</div>
            <div style={{fontSize:12,color:C.muted,marginTop:2}}>{activeAlerts.length} active · {triggeredAlerts.length} triggered</div>
          </div>
          <button onClick={()=>setScreen("add")} style={{background:C.accent,border:"none",color:"#fff",width:36,height:36,borderRadius:18,fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
        </div>
      </div>

      <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:8}}>
        {alerts.length===0&&(
          <div style={{background:C.panel,borderRadius:14,padding:"40px 20px",textAlign:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontSize:36,marginBottom:12}}>🔔</div>
            <div style={{fontSize:15,fontWeight:600,color:C.dark,marginBottom:6}}>No alerts yet</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:20,lineHeight:1.6}}>Set price alerts for your tickers — get notified when they hit your target.</div>
            <button onClick={()=>setScreen("add")} style={{background:C.accent,border:"none",color:"#fff",padding:"13px 28px",borderRadius:22,fontSize:14,fontWeight:700}}>+ Create First Alert</button>
          </div>
        )}

        {triggeredAlerts.length>0&&(
          <div style={{background:`${C.green}10`,border:`1px solid ${C.green}30`,borderRadius:14,padding:"12px 14px"}}>
            <div style={{fontSize:12,color:C.green,fontWeight:700,marginBottom:8}}>🎯 {triggeredAlerts.length} alert{triggeredAlerts.length>1?"s":""} triggered!</div>
            {triggeredAlerts.map(a=>{
              const curr=prices[a.ticker]?.current;
              const meta=TICKERS.find(t=>t.id===a.ticker);
              return(
                <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:`1px solid ${C.green}20`}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:C.dark}}>{meta?.icon} {a.ticker} {a.condition==="below"?"▼":"▲"} A${a.target}</div>
                    <div style={{fontSize:11,color:C.muted}}>Now A${curr?.toFixed(3)} · {a.triggeredAt}</div>
                    {a.note&&<div style={{fontSize:11,color:C.accent,marginTop:2}}>"{a.note}"</div>}
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>resetAlert(a.id)} style={{background:`${C.accent}10`,border:`1px solid ${C.accent}30`,color:C.accent,padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:600}}>Reset</button>
                    <button onClick={()=>deleteAlert(a.id)} style={{background:`${C.red}08`,border:`1px solid ${C.red}20`,color:C.red,padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:600}}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {activeAlerts.map(a=>{
          const curr=prices[a.ticker]?.current;
          const meta=TICKERS.find(t=>t.id===a.ticker);
          const pctAway=curr?((a.target-curr)/curr*100):0;
          const isClose=Math.abs(pctAway)<3;
          return(

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>

                      {a.condition==="below"?"📉 below":"📈 above"} A${a.target}

// ── Net Worth History ─────────────────────────────────────────────
function NetWorthHistory({prices, swanBarPrice}){
  const [history,setHistory]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("networth_history")||"[]");}catch{return[];}
  });
  const [showConfirm,setShowConfirm]=useState(false);

  const getSnapshot=()=>{
    const holdings     =JSON.parse(localStorage.getItem("cmc_holdings")||"[]");
    const swanHoldings =JSON.parse(localStorage.getItem("swan_holdings")||"[]");
    const savings      =JSON.parse(localStorage.getItem("savings_accounts")||"[]");
    const shares =holdings.reduce((s,h)=>{const p=prices[h.ticker];return s+(p?.current||h.avgCost)*h.units;},0);
    const gold   =swanBarPrice?(swanHoldings.reduce((s,h)=>s+h.qty,0)*swanBarPrice):0;
    const cash   =savings.reduce((s,a)=>s+a.balance,0);
    return{date:new Date().toLocaleDateString("en-AU"),dateSort:Date.now(),shares:+shares.toFixed(2),gold:+gold.toFixed(2),cash:+cash.toFixed(2),total:+(shares+gold+cash).toFixed(2)};
  };

  const saveSnapshot=()=>{
    const snap=getSnapshot();
    const updated=[snap,...history.filter(h=>h.date!==snap.date)].sort((a,b)=>b.dateSort-a.dateSort).slice(0,24);
    setHistory(updated);
    try{localStorage.setItem("networth_history",JSON.stringify(updated));}catch{}
    setShowConfirm(true);
    setTimeout(()=>setShowConfirm(false),2500);
  };

  const deleteSnap=dateSort=>{ const u=history.filter(h=>h.dateSort!==dateSort); setHistory(u); try{localStorage.setItem("networth_history",JSON.stringify(u));}catch{};};

  const maxTotal=history.length>0?Math.max(...history.map(h=>h.total)):1;
  const minTotal=history.length>0?Math.min(...history.map(h=>h.total)):0;
  const latest=history[0];
  const oldest=history[history.length-1];
  const totalGrowth=latest&&oldest&&oldest.total>0?((latest.total-oldest.total)/oldest.total)*100:0;

  return(
    <div style={{background:C.bg,minHeight:"100%",paddingBottom:20}}>
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"16px 20px 14px"}} className="safe-top">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:20,fontWeight:700,color:C.dark}}>📊 Net Worth History</div>
            <div style={{fontSize:12,color:C.muted,marginTop:2}}>{history.length} snapshot{history.length!==1?"s":""} saved</div>
          </div>
          <button onClick={saveSnapshot} style={{background:C.accent,border:"none",color:"#fff",padding:"8px 16px",borderRadius:20,fontSize:13,fontWeight:700}}>
            📸 Snapshot
          </button>
        </div>
      </div>

      <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
        {showConfirm&&(
          <div style={{background:`${C.green}15`,border:`1px solid ${C.green}30`,borderRadius:10,padding:"10px 14px",color:C.green,fontSize:13,fontWeight:600,textAlign:"center"}}>
            ✓ Snapshot saved!
          </div>
        )}

        {history.length===0?(
          <div style={{background:C.panel,borderRadius:14,padding:"40px 20px",textAlign:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontSize:36,marginBottom:12}}>📊</div>
            <div style={{fontSize:15,fontWeight:600,color:C.dark,marginBottom:6}}>No snapshots yet</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:20,lineHeight:1.6}}>
              Tap <strong>📸 Snapshot</strong> to save today's net worth. Come back monthly to track your wealth growing over time.
            </div>
            <button onClick={saveSnapshot} style={{background:C.accent,border:"none",color:"#fff",padding:"13px 28px",borderRadius:22,fontSize:14,fontWeight:700}}>
              📸 Save First Snapshot
            </button>
          </div>
        ):(
          <>
            {/* Growth summary */}
            {history.length>1&&(
              <div style={{background:C.panel,borderRadius:14,padding:"18px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
                <div style={{fontSize:12,color:C.muted,marginBottom:4}}>Latest Net Worth</div>
                <div style={{fontSize:30,fontWeight:800,color:C.dark,fontFamily:"monospace"}}>
                  A${latest.total.toLocaleString("en-AU",{minimumFractionDigits:2})}
                </div>
                <div style={{fontSize:13,fontWeight:600,color:totalGrowth>=0?C.green:C.red,marginTop:6}}>
                  {totalGrowth>=0?"+":""}{totalGrowth.toFixed(1)}% since {oldest.date}
                </div>

                {/* Mini chart */}
                <div style={{marginTop:14,height:70}}>
                  <svg width="100%" viewBox="0 0 300 70" preserveAspectRatio="none" style={{display:"block"}}>
                    <defs>
                      <linearGradient id="nwGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor={C.accent} stopOpacity="0.2"/>
                        <stop offset="100%" stopColor={C.accent} stopOpacity="0"/>
                      </linearGradient>
                    </defs>
                    {(()=>{
                      const sorted=[...history].sort((a,b)=>a.dateSort-b.dateSort);
                      const range=maxTotal-minTotal||1;
                      const pts=sorted.map((h,i)=>`${(i/(sorted.length-1||1))*300},${66-((h.total-minTotal)/range)*62}`).join(" ");
                      return(<g>
                        <polygon points={`0,66 ${pts} 300,66`} fill="url(#nwGrad)"/>
                        <polyline points={pts} fill="none" stroke={C.accent} strokeWidth="2" strokeLinejoin="round"/>
                      </g>);
                    })()}
                  </svg>
                </div>
              </div>
            )}

            {/* Snapshot list */}
            <div style={{background:C.panel,borderRadius:14,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 80px 32px",gap:6,padding:"8px 14px",background:`${C.accent}08`,fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}}>
                <span>Date</span><span style={{textAlign:"right"}}>Shares</span><span style={{textAlign:"right"}}>Gold</span><span style={{textAlign:"right"}}>Total</span><span/>
              </div>
              {history.map((h,i)=>{
                const prev=history[i+1];
                const change=prev?h.total-prev.total:null;
                return(
                  <div key={h.dateSort} style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 80px 32px",gap:6,padding:"10px 14px",borderTop:`1px solid ${C.border}`,alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:C.dark}}>{h.date}</div>
                      {change!==null&&<div style={{fontSize:10,color:change>=0?C.green:C.red,marginTop:1}}>{change>=0?"+":""}A${change.toFixed(0)}</div>}
                    </div>
                    <div style={{textAlign:"right",fontSize:12,color:C.muted,fontFamily:"monospace"}}>A${(h.shares/1000).toFixed(1)}k</div>
                    <div style={{textAlign:"right",fontSize:12,color:C.muted,fontFamily:"monospace"}}>A${(h.gold/1000).toFixed(1)}k</div>
                    <div style={{textAlign:"right",fontSize:13,fontWeight:700,color:C.dark,fontFamily:"monospace"}}>A${(h.total/1000).toFixed(1)}k</div>
                    <button onClick={()=>deleteSnap(h.dateSort)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,width:24,height:24,borderRadius:12,fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                  </div>
                );
              })}
            </div>

            <div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}20`,borderRadius:10,padding:"12px 14px"}}>
              <div style={{fontSize:12,color:C.muted,lineHeight:1.6}}>
                💡 <strong style={{color:C.dark}}>Tip:</strong> Tap <strong style={{color:C.dark}}>📸 Snapshot</strong> once a month to build your wealth history. Stores up to 24 snapshots.
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function App(){
  const prices=useLivePrices();
  const [selected,setSelected]=useState(null);
  const [mainTab,setMainTab]=useState("watchlist");
  const TROY_OZ=5/31.1035,PREMIUM=1.04;
  const [swanBarPrice,setSwanBarPrice]=useState(null);

  const fetchSwanPrice=useCallback(async()=>{
    try{
      let spot=null;
      // Primary: open.er-api.com - free, no key, supports XAU natively
      try{
        const res=await fetch("https://open.er-api.com/v6/latest/XAU");
        const d=await res.json();
        if(d.result==="success"&&d.rates?.AUD&&d.rates.AUD>1000) spot=d.rates.AUD;
      }catch(e){}
      // Fallback: derive from GOLD ETF price on watchlist
      if(!spot||spot<1000){
        const g=prices["GOLD"]?.current||57.04;
        spot=g*100; // each GOLD unit = 1/100 oz, so price*100 ≈ spot/oz
      }
      setSwanBarPrice(spot*TROY_OZ*PREMIUM);
    }catch{
      const g=prices["GOLD"]?.current||57.04;
      setSwanBarPrice(g*100*TROY_OZ*PREMIUM);
    }
  },[prices]);

  useEffect(()=>{fetchSwanPrice();const id=setInterval(fetchSwanPrice,120000);return()=>clearInterval(id);},[]);

  if(selected)return(<StockDetail tickerId={selected} prices={prices} onBack={()=>setSelected(null)}/>);

  return(<div style={{display:"flex",flexDirection:"column",height:"100%",width:"100%",background:C.bg,overflow:"hidden",position:"fixed",top:0,left:0,right:0,bottom:0}}>
    <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",overscrollBehavior:"contain"}}>
      {mainTab==="watchlist"?<WatchlistScreen prices={prices} onSelect={setSelected}/>
      :mainTab==="portfolio"?<PortfolioScreen prices={prices} onSelectTicker={setSelected}/>
      :mainTab==="gold"?<SwanBullionScreen sharedBarPrice={swanBarPrice} onPriceUpdate={setSwanBarPrice}/>
      :mainTab==="savings"?<SavingsScreen/>
      :mainTab==="finance"?<FinanceScreen/>
      :mainTab==="dca"?<DCAScreen prices={prices}/>
      :mainTab==="alerts"?<AlertsScreen prices={prices}/>
      :mainTab==="history"?<NetWorthHistory prices={prices} swanBarPrice={swanBarPrice}/>
      :<TotalPortfolioScreen prices={prices} swanBarPrice={swanBarPrice}/>}
    </div>
    <div style={{background:C.panel,borderTop:`1px solid ${C.border}`,display:"flex",flexShrink:0,minHeight:56}} className="safe-bot">
      {[{id:"watchlist",icon:"📈",label:"Watch"},{id:"portfolio",icon:"💼",label:"Hold"},
        {id:"gold",icon:"🥇",label:"Gold"},{id:"savings",icon:"🏦",label:"Save"},
        {id:"finance",icon:"💰",label:"Budget"},{id:"dca",icon:"📐",label:"DCA"},
        {id:"alerts",icon:"🔔",label:"Alerts"},{id:"history",icon:"📊",label:"History"},
        {id:"total",icon:"🌐",label:"Total"}].map(tab=>(
        <button key={tab.id} onClick={()=>setMainTab(tab.id)} style={{flex:1,background:"transparent",border:"none",padding:"6px 0 3px",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
          <span style={{fontSize:18}}>{tab.icon}</span>
          <span style={{fontSize:8,fontWeight:600,color:mainTab===tab.id?"#1a56db":"#8a94a6",letterSpacing:0}}>{tab.label}</span>
          {mainTab===tab.id&&<div style={{width:20,height:2,background:"#1a56db",borderRadius:1,marginTop:2}}/>}
        </button>
      ))}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  const sw=`const CACHE='st-v3';self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['/']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/')))));`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>
