// Uses GNews API free tier (100 req/day) — get key at gnews.io
// Falls back to curated static headlines if no key set
const GNEWS_KEY = "YOUR_GNEWS_KEY"; // get free key at gnews.io

const STATIC_NEWS = [
  {ticker:"NVDA", title:"NVIDIA posts record data centre revenue as AI demand surges", source:"Reuters", age:"2h", url:"#", sentiment:"positive"},
  {ticker:"NVDA", title:"NVIDIA H200 GPU supply constraints ease heading into Q3", source:"Bloomberg", age:"5h", url:"#", sentiment:"positive"},
  {ticker:"DHHF", title:"ASX closes higher as global equities rally on Fed pivot hopes", source:"AFR", age:"3h", url:"#", sentiment:"positive"},
  {ticker:"DHHF", title:"BetaShares ETF inflows hit record as retail investors pile into diversified funds", source:"Livewire", age:"1d", url:"#", sentiment:"positive"},
  {ticker:"FANG", title:"Meta and Alphabet beat earnings estimates, lifting tech ETFs", source:"CNBC", age:"4h", url:"#", sentiment:"positive"},
  {ticker:"FANG", title:"Apple announces expanded AI features ahead of WWDC 2026", source:"9to5Mac", age:"6h", url:"#", sentiment:"positive"},
  {ticker:"PMGOLD", title:"Gold holds above US$3,200 as central banks continue accumulation", source:"Kitco", age:"1h", url:"#", sentiment:"positive"},
  {ticker:"PMGOLD", title:"Perth Mint reports strong retail demand for physical gold in Q2", source:"Perth Mint", age:"2d", url:"#", sentiment:"positive"},
  {ticker:"GOLD",  title:"ASX:GOLD ETF sees record weekly inflows amid inflation concerns", source:"MarketIndex", age:"3h", url:"#", sentiment:"positive"},
  {ticker:"GOLD",  title:"AUD gold price near all-time high as USD softens", source:"AFR", age:"8h", url:"#", sentiment:"positive"},
];

function NewsScreen({onSelectTicker}){
  const [news, setNews]         = useState([]);
  const [loading, setLoading]   = useState(false);
  const [activeTicker, setActiveTicker] = useState("ALL");
  const [lastRefresh, setLastRefresh]   = useState(null);

  const fetchNews = useCallback(async(ticker)=>{
    setLoading(true);
    let fetched = [];

    if(GNEWS_KEY && GNEWS_KEY !== "YOUR_GNEWS_KEY"){
      try{
        const query = ticker==="ALL"
          ? "NVIDIA OR DHHF OR ASX ETF OR gold bullion"
          : ticker==="NVDA" ? "NVIDIA stock"
          : ticker==="DHHF" ? "BetaShares DHHF ASX ETF"
          : ticker==="FANG" ? "FANG+ ETF tech stocks"
          : ticker==="PMGOLD"||ticker==="GOLD" ? "gold price ASX"
          : ticker;
        const url = `https://gnews.io/api/v4/search?q=${encodeURIComponent(query)}&lang=en&max=10&token=${GNEWS_KEY}`;
        const res = await fetch(url);
        const d   = await res.json();
        if(d.articles){
          fetched = d.articles.map(a=>({
            ticker: ticker==="ALL"?"MARKET":ticker,
            title: a.title,
            source: a.source?.name||"News",
            age: timeAgo(new Date(a.publishedAt)),
            url: a.url,
            sentiment: a.title.toLowerCase().match(/fall|drop|crash|loss|concern|risk|warn/)?"negative":"positive",
          }));
        }
      }catch(e){ fetched=[]; }
    }

    // Always use static news as fallback/supplement
    if(fetched.length===0){
      fetched = ticker==="ALL"
        ? STATIC_NEWS
        : STATIC_NEWS.filter(n=>n.ticker===ticker);
    }

    setNews(fetched);
    setLastRefresh(new Date());
    setLoading(false);
  },[]);

  const timeAgo = (date)=>{
    const diff = Math.floor((Date.now()-date)/1000);
    if(diff<3600) return Math.floor(diff/60)+"m ago";
    if(diff<86400) return Math.floor(diff/3600)+"h ago";
    return Math.floor(diff/86400)+"d ago";
  };

  useEffect(()=>{ fetchNews(activeTicker); },[activeTicker]);

  const sentColor = s => s==="positive"?C.green:s==="negative"?C.red:C.muted;

  return(
    <div style={{background:C.bg,minHeight:"100%",paddingBottom:20}}>
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"16px 20px 0"}} className="safe-top">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{fontSize:20,fontWeight:700,color:C.dark}}>Market News</div>
            <div style={{fontSize:12,color:C.muted,marginTop:2}}>{lastRefresh?"Updated "+lastRefresh.toLocaleTimeString():"Loading..."}</div>
          </div>
          <button onClick={()=>fetchNews(activeTicker)} disabled={loading}
            style={{background:`${C.accent}10`,border:`1px solid ${C.accent}30`,color:C.accent,padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:600}}>
            {loading?"…":"↻"}
          </button>
        </div>
        {/* Ticker filter pills */}
        <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:12,WebkitOverflowScrolling:"touch"}}>
          {["ALL","NVDA","DHHF","FANG","PMGOLD","GOLD"].map(t=>(
            <button key={t} onClick={()=>setActiveTicker(t)}
              style={{background:activeTicker===t?C.dark:`${C.accent}10`,border:`1px solid ${activeTicker===t?C.dark:C.border}`,
                color:activeTicker===t?"#fff":C.muted,padding:"6px 14px",borderRadius:20,fontSize:12,
                fontWeight:600,whiteSpace:"nowrap",flexShrink:0}}>
              {t==="ALL"?"🌐 All":t}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:"12px 16px"}}>
        {loading&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:C.muted}}>
            <div style={{fontSize:28,marginBottom:8}}>📰</div>Loading news...
          </div>
        )}
        {!loading&&news.length===0&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:C.muted}}>
            <div style={{fontSize:28,marginBottom:8}}>📭</div>No news found
          </div>
        )}
        {!loading&&news.map((item,i)=>(
          <div key={i} onClick={()=>item.url&&item.url!=="#"&&window.open(item.url,"_blank")}
            style={{background:C.panel,borderRadius:14,padding:"14px 16px",marginBottom:8,
              boxShadow:"0 1px 3px rgba(0,0,0,0.06)",cursor:item.url!=="#"?"pointer":"default"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                  <span style={{fontSize:10,fontWeight:700,background:C.dark,color:"#fff",padding:"2px 7px",borderRadius:10}}>
                    {item.ticker}
                  </span>
                  <span style={{fontSize:10,color:C.muted}}>{item.source}</span>
                  <span style={{fontSize:10,color:C.muted}}>· {item.age}</span>
                </div>
                <div style={{fontSize:14,fontWeight:600,color:C.dark,lineHeight:1.4}}>{item.title}</div>
              </div>
              <div style={{width:8,height:8,borderRadius:4,background:sentColor(item.sentiment),flexShrink:0,marginTop:4}}/>
            </div>
            {item.url&&item.url!=="#"&&(
              <div style={{fontSize:11,color:C.accent,marginTop:8}}>Read full article →</div>
            )}
          </div>
        ))}

        {GNEWS_KEY==="YOUR_GNEWS_KEY"&&(
          <div style={{background:`${C.amber}10`,border:`1px solid ${C.amber}30`,borderRadius:12,padding:"12px 14px",marginTop:4}}>
            <div style={{fontSize:12,color:C.amber,fontWeight:600,marginBottom:4}}>📰 Showing sample headlines</div>
            <div style={{fontSize:11,color:C.muted,lineHeight:1.6}}>
              For live news, get a free key at <strong style={{color:C.dark}}>gnews.io</strong> and replace <strong>YOUR_GNEWS_KEY</strong> in the code.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}







// ── Personal Finance Dashboard ────────────────────────────────────
const EXPENSE_CATEGORIES = [
  {id:"rent",      label:"Rent/Mortgage", icon:"🏠", color:"#e8334a"},
  {id:"food",      label:"Food & Groceries", icon:"🛒", color:"#f5a623"},
  {id:"transport", label:"Transport",     icon:"🚗", color:"#1a56db"},
  {id:"utilities", label:"Utilities",     icon:"⚡", color:"#7c3aed"},
  {id:"entertainment",label:"Entertainment",icon:"🎬",color:"#0891b2"},
  {id:"health",    label:"Health",        icon:"💊", color:"#00a86b"},
  {id:"shopping",  label:"Shopping",      icon:"🛍️", color:"#db2777"},
  {id:"other",     label:"Other",         icon:"📦", color:"#6b7280"},
];

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function FinanceScreen(){
  const now = new Date();
  const [selMonth, setSelMonth] = useState(now.getMonth());
  const [selYear,  setSelYear]  = useState(now.getFullYear());
  const [screen,   setScreen]   = useState("dash"); // dash | addTx | addGoal | allTx
  const [txForm,   setTxForm]   = useState({desc:"",amount:"",type:"expense",cat:"food",date:new Date().toISOString().slice(0,10)});
  const [goalForm, setGoalForm] = useState({name:"",target:"",saved:""});
  const [editGoalId, setEditGoalId] = useState(null);

  const load = (key, def) => { try{ return JSON.parse(localStorage.getItem(key)||"null")||def; }catch{ return def; } };
  const persist = (key,val) => { try{ localStorage.setItem(key,JSON.stringify(val)); }catch{} };

  const [transactions, setTransactions] = useState(()=>load("fin_transactions",[]));
  const [goals,        setGoals]        = useState(()=>load("fin_goals",[]));
  const [income,       setIncome]       = useState(()=>load("fin_income",{})); // {YYYY-MM: amount}

  const saveTx  = v => { setTransactions(v); persist("fin_transactions",v); };
  const saveGoals = v => { setGoals(v); persist("fin_goals",v); };
  const saveIncome = v => { setIncome(v); persist("fin_income",v); };

  const monthKey = `${selYear}-${String(selMonth+1).padStart(2,"0")}`;
  const prevMonth = selMonth===0?11:selMonth-1;
  const prevYear  = selMonth===0?selYear-1:selYear;
  const prevKey   = `${prevYear}-${String(prevMonth+1).padStart(2,"0")}`;

  const monthTx = transactions.filter(t=>t.date.startsWith(monthKey));
  const prevTx  = transactions.filter(t=>t.date.startsWith(prevKey));

  const monthExpenses = monthTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const prevExpenses  = prevTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const monthIncome   = income[monthKey]||0;
  const prevIncome    = income[prevKey]||0;
  const saved         = monthIncome - monthExpenses;
  const savedPct      = monthIncome>0?Math.round((saved/monthIncome)*100):0;

  // Expenses by category
  const byCat = EXPENSE_CATEGORIES.map(cat=>({
    ...cat,
    amount: monthTx.filter(t=>t.type==="expense"&&t.cat===cat.id).reduce((s,t)=>s+t.amount,0),
  })).filter(c=>c.amount>0).sort((a,b)=>b.amount-a.amount);

  // Add transaction
  const addTx = () => {
    const amount = parseFloat(txForm.amount);
    if(!txForm.desc.trim()||isNaN(amount)||amount<=0) return;
    const tx = {id:Date.now(),desc:txForm.desc.trim(),amount,type:txForm.type,cat:txForm.cat,date:txForm.date};
    saveTx([tx,...transactions]);
    setTxForm({desc:"",amount:"",type:"expense",cat:"food",date:new Date().toISOString().slice(0,10)});
    setScreen("dash");
  };

  const deleteTx = id => saveTx(transactions.filter(t=>t.id!==id));

  // Goal functions
  const addGoal = () => {
    const target = parseFloat(goalForm.target);
    const saved  = parseFloat(goalForm.saved)||0;
    if(!goalForm.name.trim()||isNaN(target)||target<=0) return;
    if(editGoalId){
      saveGoals(goals.map(g=>g.id===editGoalId?{...g,name:goalForm.name.trim(),target,saved}:g));
      setEditGoalId(null);
    } else {
      saveGoals([...goals,{id:Date.now(),name:goalForm.name.trim(),target,saved}]);
    }
    setGoalForm({name:"",target:"",saved:""});
    setScreen("dash");
  };

  const updateGoalSaved = (id,val) => saveGoals(goals.map(g=>g.id===id?{...g,saved:parseFloat(val)||0}:g));
  const deleteGoal = id => saveGoals(goals.filter(g=>g.id!==id));

  // Ring chart SVG
  const RingChart = ({pct,size=100,color,label,sublabel}) => {
    const r=36,cx=size/2,cy=size/2,circ=2*Math.PI*r;
    const dash = Math.min(pct/100,1)*circ;
    return(
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.border} strokeWidth="8"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="8"
          strokeDasharray={`${dash} ${circ}`} strokeDashoffset={circ/4}
          strokeLinecap="round" transform={`rotate(-90 ${cx} ${cy})`}/>
        <text x={cx} y={cy-6} textAnchor="middle" fontSize="16" fontWeight="700" fill={C.dark}>{pct}%</text>
        {label&&<text x={cx} y={cy+10} textAnchor="middle" fontSize="9" fill={C.muted}>{label}</text>}
        {sublabel&&<text x={cx} y={cy+22} textAnchor="middle" fontSize="8" fill={C.muted}>{sublabel}</text>}
      </svg>
    );
  };

  // ── Add Transaction screen ──
  if(screen==="addTx") return(
    <div style={{background:C.bg,minHeight:"100%"}}>
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px"}} className="safe-top">
        <button onClick={()=>setScreen("dash")} style={{background:"transparent",border:"none",color:C.accent,fontSize:15,fontWeight:600}}>Cancel</button>
        <span style={{fontWeight:600,fontSize:15,color:C.dark}}>Add Transaction</span>
        <button onClick={addTx} style={{background:"transparent",border:"none",color:C.accent,fontSize:15,fontWeight:700}}>Save</button>
      </div>
      <div style={{padding:"20px 16px",display:"flex",flexDirection:"column",gap:12}}>
        {/* Type toggle */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[{v:"expense",l:"💸 Expense"},{v:"income",l:"💰 Income"}].map(({v,l})=>(
            <button key={v} onClick={()=>setTxForm(p=>({...p,type:v}))}
              style={{background:txForm.type===v?(v==="expense"?C.red:C.green):`${C.accent}10`,border:"none",color:txForm.type===v?"#fff":C.muted,padding:"12px",borderRadius:12,fontSize:14,fontWeight:700}}>
              {l}
            </button>
          ))}
        </div>
        {[
          {label:"Description",el:<input value={txForm.desc} onChange={e=>setTxForm(p=>({...p,desc:e.target.value}))} placeholder="e.g. Woolworths, Rent, Salary" style={{width:"100%",border:"none",outline:"none",fontSize:16,color:C.dark,fontWeight:600,background:"transparent"}}/>},
          {label:"Amount (A$)",el:<input type="number" value={txForm.amount} onChange={e=>setTxForm(p=>({...p,amount:e.target.value}))} placeholder="0.00" style={{width:"100%",border:"none",outline:"none",fontSize:16,color:C.dark,fontWeight:600,background:"transparent",fontFamily:"monospace"}}/>},
          {label:"Date",el:<input type="date" value={txForm.date} onChange={e=>setTxForm(p=>({...p,date:e.target.value}))} style={{width:"100%",border:"none",outline:"none",fontSize:16,color:C.dark,fontWeight:600,background:"transparent"}}/>},
        ].map(({label,el})=>(
          <div key={label} style={{background:C.panel,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
            {el}
          </div>
        ))}
        {txForm.type==="expense"&&(
          <div style={{background:C.panel,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>Category</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {EXPENSE_CATEGORIES.map(cat=>(
                <button key={cat.id} onClick={()=>setTxForm(p=>({...p,cat:cat.id}))}
                  style={{background:txForm.cat===cat.id?cat.color:`${cat.color}15`,border:`1px solid ${txForm.cat===cat.id?cat.color:C.border}`,color:txForm.cat===cat.id?"#fff":C.dark,padding:"6px 12px",borderRadius:20,fontSize:12,fontWeight:600}}>
                  {cat.icon} {cat.label.split(" ")[0]}
                </button>
              ))}
            </div>
          </div>
        )}
        <button onClick={addTx} style={{background:txForm.type==="expense"?C.red:C.green,border:"none",color:"#fff",padding:"15px",borderRadius:12,fontSize:15,fontWeight:700,marginTop:4}}>
          Add {txForm.type==="expense"?"Expense":"Income"}
        </button>
      </div>
    </div>
  );

  // ── Add/Edit Goal screen ──
  if(screen==="addGoal") return(
    <div style={{background:C.bg,minHeight:"100%"}}>
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px"}} className="safe-top">
        <button onClick={()=>{setScreen("dash");setEditGoalId(null);setGoalForm({name:"",target:"",saved:""}); }} style={{background:"transparent",border:"none",color:C.accent,fontSize:15,fontWeight:600}}>Cancel</button>
        <span style={{fontWeight:600,fontSize:15,color:C.dark}}>{editGoalId?"Edit Goal":"New Goal"}</span>
        <button onClick={addGoal} style={{background:"transparent",border:"none",color:C.accent,fontSize:15,fontWeight:700}}>Save</button>
      </div>
      <div style={{padding:"20px 16px",display:"flex",flexDirection:"column",gap:12}}>
        {[
          {label:"Goal Name",key:"name",placeholder:"e.g. Emergency Fund, Holiday, House Deposit",type:"text"},
          {label:"Target Amount (A$)",key:"target",placeholder:"e.g. 20000",type:"number"},
          {label:"Amount Already Saved (A$)",key:"saved",placeholder:"e.g. 5000",type:"number"},
        ].map(({label,key,placeholder,type})=>(
          <div key={key} style={{background:C.panel,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
            <input type={type} value={goalForm[key]} onChange={e=>setGoalForm(p=>({...p,[key]:e.target.value}))} placeholder={placeholder}
              style={{width:"100%",border:"none",outline:"none",fontSize:16,color:C.dark,fontWeight:600,background:"transparent",fontFamily:type==="number"?"monospace":"inherit"}}/>
          </div>
        ))}
        <button onClick={addGoal} style={{background:C.accent,border:"none",color:"#fff",padding:"15px",borderRadius:12,fontSize:15,fontWeight:700,marginTop:4}}>
          {editGoalId?"Update Goal":"Create Goal"}
        </button>
      </div>
    </div>
  );

  // ── Dashboard ──
  return(
    <div style={{background:C.bg,minHeight:"100%",paddingBottom:20}}>
      {/* Header */}
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"16px 20px 14px"}} className="safe-top">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:20,fontWeight:700,color:C.dark}}>💰 Finance</div>
            <div style={{fontSize:12,color:C.muted,marginTop:2}}>{MONTHS[selMonth]} {selYear}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>{if(selMonth===0){setSelMonth(11);setSelYear(y=>y-1);}else setSelMonth(m=>m-1);}}
              style={{background:C.bg,border:`1px solid ${C.border}`,color:C.dark,width:32,height:32,borderRadius:16,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            <button onClick={()=>{if(selMonth===11){setSelMonth(0);setSelYear(y=>y+1);}else setSelMonth(m=>m+1);}}
              style={{background:C.bg,border:`1px solid ${C.border}`,color:C.dark,width:32,height:32,borderRadius:16,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
            <button onClick={()=>setScreen("addTx")}
              style={{background:C.accent,border:"none",color:"#fff",width:36,height:36,borderRadius:18,fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
          </div>
        </div>
      </div>

      <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>

        {/* Income input */}
        <div style={{background:C.panel,borderRadius:14,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Monthly Income (A$)</div>
          <input type="number"
            value={monthIncome||""}
            onChange={e=>{ const v=parseFloat(e.target.value)||0; saveIncome({...income,[monthKey]:v}); }}
            placeholder="Enter your income for this month"
            style={{width:"100%",border:"none",outline:"none",fontSize:20,color:C.dark,fontWeight:700,background:"transparent",fontFamily:"monospace"}}/>
        </div>

        {/* 3 summary cards */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[
            {label:"INCOME",val:`A$${monthIncome.toLocaleString("en-AU",{minimumFractionDigits:0})}`,sub:prevIncome>0?`${monthIncome>=prevIncome?"↑":"↓"} vs ${MONTHS[prevMonth]}`:"",color:C.green},
            {label:"EXPENSES",val:`A$${Math.round(monthExpenses).toLocaleString("en-AU")}`,sub:prevExpenses>0?`${monthExpenses<=prevExpenses?"↓":"↑"} vs ${MONTHS[prevMonth]}`:"",color:C.red},
            {label:"SAVED",val:`A$${Math.max(0,Math.round(saved)).toLocaleString("en-AU")}`,sub:savedPct>0?`${savedPct}% of income`:"",color:saved>=0?C.accent:C.red},
          ].map(({label,val,sub,color})=>(
            <div key={label} style={{background:C.panel,borderRadius:12,padding:"12px 10px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>{label}</div>
              <div style={{fontSize:13,fontWeight:700,color:C.dark,fontFamily:"monospace",lineHeight:1.2}}>{val}</div>
              {sub&&<div style={{fontSize:9,color,marginTop:3,fontWeight:600}}>{sub}</div>}
            </div>
          ))}
        </div>

        {/* Expenses by category */}
        {byCat.length>0&&(
          <div style={{background:C.panel,borderRadius:14,padding:"16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:600,fontSize:13,color:C.dark,marginBottom:12}}>Expenses by Category</div>
            {byCat.map(cat=>{
              const pct=monthExpenses>0?Math.round((cat.amount/monthExpenses)*100):0;
              return(
                <div key={cat.id} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:13,color:C.dark}}>{cat.icon} {cat.label}</span>
                    <span style={{fontSize:13,fontWeight:600,color:C.dark,fontFamily:"monospace"}}>A${cat.amount.toFixed(2)}</span>
                  </div>
                  <div style={{height:6,background:C.bg,borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:cat.color,borderRadius:3,transition:"width 0.4s"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Savings goals */}
        <div style={{background:C.panel,borderRadius:14,padding:"16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:600,fontSize:13,color:C.dark}}>Savings Goals</div>
            <button onClick={()=>setScreen("addGoal")} style={{background:`${C.accent}10`,border:`1px solid ${C.accent}30`,color:C.accent,padding:"5px 12px",borderRadius:16,fontSize:12,fontWeight:600}}>+ Goal</button>
          </div>
          {goals.length===0?(
            <div style={{textAlign:"center",padding:"20px 0",color:C.muted,fontSize:13}}>No goals yet — tap + Goal to add one</div>
          ):(
            <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch"}}>
              {goals.map(g=>{
                const pct=g.target>0?Math.min(100,Math.round((g.saved/g.target)*100)):0;
                return(
                  <div key={g.id} style={{background:C.bg,borderRadius:12,padding:"14px",minWidth:140,flexShrink:0,textAlign:"center"}}>
                    <RingChart pct={pct} size={90} color={pct>=100?C.green:C.accent} label={`A$${(g.saved/1000).toFixed(0)}k`} sublabel={`of A$${(g.target/1000).toFixed(0)}k`}/>
                    <div style={{fontSize:12,fontWeight:600,color:C.dark,marginTop:8,lineHeight:1.3}}>{g.name}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2}}>A${(g.target-g.saved).toFixed(0)} to go</div>
                    <div style={{display:"flex",gap:4,marginTop:8,justifyContent:"center"}}>
                      <button onClick={()=>{setGoalForm({name:g.name,target:String(g.target),saved:String(g.saved)});setEditGoalId(g.id);setScreen("addGoal");}}
                        style={{background:`${C.accent}10`,border:"none",color:C.accent,padding:"4px 8px",borderRadius:8,fontSize:10,fontWeight:600}}>Edit</button>
                      <button onClick={()=>deleteGoal(g.id)}
                        style={{background:`${C.red}10`,border:"none",color:C.red,padding:"4px 8px",borderRadius:8,fontSize:10,fontWeight:600}}>✕</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Recent transactions */}
        <div style={{background:C.panel,borderRadius:14,padding:"16px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:600,fontSize:13,color:C.dark}}>Recent Transactions</div>
            <button onClick={()=>setScreen("addTx")} style={{background:`${C.accent}10`,border:`1px solid ${C.accent}30`,color:C.accent,padding:"5px 12px",borderRadius:16,fontSize:12,fontWeight:600}}>+ Add</button>
          </div>
          {monthTx.length===0?(
            <div style={{textAlign:"center",padding:"20px 0",color:C.muted,fontSize:13}}>
              No transactions for {MONTHS[selMonth]}. Tap + Add to log one.
            </div>
          ):(
            [...monthTx].slice(0,10).map(tx=>{
              const cat=EXPENSE_CATEGORIES.find(c=>c.id===tx.cat);
              return(
                <div key={tx.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{width:36,height:36,borderRadius:18,background:tx.type==="income"?`${C.green}15`:`${cat?.color||C.muted}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
                    {tx.type==="income"?"💰":cat?.icon||"📦"}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:C.dark,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tx.desc}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:1}}>{tx.date} {tx.type==="expense"?`· ${cat?.label||"Other"}`:"· Income"}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:14,fontWeight:700,color:tx.type==="income"?C.green:C.red,fontFamily:"monospace"}}>
                      {tx.type==="income"?"+":"-"}A${tx.amount.toFixed(2)}
                    </div>
                  </div>
                  <button onClick={()=>deleteTx(tx.id)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,width:24,height:24,borderRadius:12,fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
                </div>
              );
            })
          )}
          {monthTx.length>10&&<div style={{textAlign:"center",padding:"10px 0",fontSize:12,color:C.muted}}>{monthTx.length-10} more transactions this month</div>}
        </div>

      </div>
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────
function App(){
  const prices=useLivePrices();
  const [selected,setSelected]=useState(null);
  const [mainTab,setMainTab]=useState("watchlist");


  // ── Live Swan Bullion bar price (shared across Gold Bar + Total tabs) ──
  const TROY_OZ=5/31.1035, PREMIUM=1.04;
  const [swanBarPrice,setSwanBarPrice]=useState(null);

  const fetchSwanPrice=useCallback(async()=>{
    try{
      const [fxRes,goldRes]=await Promise.all([
        fetch("https://api.frankfurter.app/latest?from=USD&to=AUD"),
        fetch("https://data-asg.goldprice.org/dbXRates/USD")
      ]);
      const fx=await fxRes.json();
      const gold=await goldRes.json();
      const spotAUDPerOz=gold.items[0].xauPrice*fx.rates.AUD;
      setSwanBarPrice(spotAUDPerOz*TROY_OZ*PREMIUM);
    }catch{
      // fallback: derive from GOLD ETF (each unit ≈ 1/100 oz)
      const goldETFPrice=prices["GOLD"]?.current||57.04;
      setSwanBarPrice(goldETFPrice*100*TROY_OZ*PREMIUM);
    }
  },[prices]);

  useEffect(()=>{
    fetchSwanPrice();
    const id=setInterval(fetchSwanPrice, 5*60*1000);
    return()=>clearInterval(id);
  },[]);

  if(selected) return <StockDetail tickerId={selected} prices={prices} onBack={()=>setSelected(null)}/>;

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",width:"100%",background:C.bg,overflow:"hidden",position:"fixed",top:0,left:0,right:0,bottom:0}}>
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",overscrollBehavior:"contain"}}>
        {mainTab==="watchlist"?<WatchlistScreen prices={prices} onSelect={setSelected}/>
        :mainTab==="portfolio"?<PortfolioScreen prices={prices} onSelectTicker={setSelected}/>
        :mainTab==="gold"?<SwanBullionScreen sharedBarPrice={swanBarPrice} onPriceUpdate={setSwanBarPrice}/>
        :mainTab==="savings"?<SavingsScreen/>
        :mainTab==="news"?<NewsScreen onSelectTicker={setSelected}/>
        :mainTab==="finance"?<FinanceScreen/>
        :<TotalPortfolioScreen prices={prices} swanBarPrice={swanBarPrice}/>}
      </div>
      <div style={{background:C.panel,borderTop:`1px solid ${C.border}`,display:"flex",flexShrink:0,minHeight:56}} className="safe-bot">
        {[{id:"watchlist",icon:"📈",label:"Watchlist"},{id:"portfolio",icon:"💼",label:"Portfolio"},{id:"gold",icon:"🥇",label:"Gold"},{id:"savings",icon:"🏦",label:"Savings"},{id:"finance",icon:"💰",label:"Finance"},{id:"news",icon:"📰",label:"News"},{id:"total",icon:"🌐",label:"Total"}].map(tab=>(
          <button key={tab.id} onClick={()=>setMainTab(tab.id)} style={{flex:1,background:"transparent",border:"none",padding:"10px 0 4px",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:20}}>{tab.icon}</span>
            <span style={{fontSize:9,fontWeight:600,color:mainTab===tab.id?C.accent:C.muted,letterSpacing:0}}>{tab.label}</span>
            {mainTab===tab.id&&<div style={{width:20,height:2,background:C.accent,borderRadius:1,marginTop:2}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- PWA Service Worker for offline support -->
<script>
if('serviceWorker' in navigator){
  const sw=`
    const CACHE='stock-tracker-v1';
    const ASSETS=['/'];
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
    self.addEventListener('fetch',e=>e.respondWith(
      caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/')))
    ));
  `;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>
